<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

</head>
<body class="bg-[#0b0f19] text-gray-100 font-sans min-h-screen pb-12">

    <!-- Navbar -->
    <nav class="border-b border-gray-800 bg-[#0f172a] p-4 sticky top-0 z-50">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-tight bg-gradient-to-r from-emerald-400 to-cyan-400 bg-clip-text text-transparent">
                🟩 HabitGrid
            </h1>
            <span class="text-xs text-gray-400 bg-gray-800 px-2.5 py-1 rounded-full font-mono" id="current-month">July 2026</span>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4 space-y-6">
        
        <!-- Add New Habit Form -->
        <section class="bg-[#0f172a] border border-gray-800 rounded-xl p-4 shadow-xl">
            <form id="habit-form" class="flex flex-col sm:flex-row gap-3">
                <input type="text" id="habit-name" required placeholder="New habit (e.g., LeetCode, Avoid Soda)..." 
                    class="flex-grow bg-[#1e293b] border border-gray-700 rounded-lg px-4 py-2.5 text-sm text-gray-100 focus:outline-none focus:border-emerald-500">
                <div class="flex gap-2">
                    <select id="habit-type" class="bg-[#1e293b] border border-gray-700 rounded-lg px-3 py-2.5 text-sm font-medium focus:outline-none focus:border-emerald-500">
                        <option value="want">🟢 Want (Build)</option>
                        <option value="dont">🔴 Don't (Break)</option>
                    </select>
                    <button type="submit" class="w-full sm:w-auto bg-emerald-600 hover:bg-emerald-500 text-white font-medium text-sm px-6 py-2.5 rounded-lg transition-colors cursor-pointer">
                        Add
                    </button>
                </div>
            </form>
        </section>

        <!-- Habit Lists Container -->
        <div id="habits-container" class="space-y-4">
            <!-- Habit tracking rows inject here via JavaScript -->
        </div>
    </main>

    <script>
        // App State
        let habits = JSON.parse(localStorage.getItem('habitgrid_data')) || [
            { id: '1', name: 'Write Code', type: 'want', history: { '2026-07-01': true, '2026-07-02': true, '2026-07-03': true } },
            { id: '2', name: 'Doomscrolling', type: 'dont', history: { '2026-07-01': false, '2026-07-02': true } }
        ];

        // 2026 Date Helper Setup (Matches current month query context)
        const currentYear = 2026;
        const currentMonthIndex = 6; // July (0-indexed)
        const daysInMonth = 31;

        document.getElementById('current-month').innerText = "July 2026";

        // DOM Elements
        const habitForm = document.getElementById('habit-form');
        const habitsContainer = document.getElementById('habits-container');

        // Form Submit Handler
        habitForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const nameInput = document.getElementById('habit-name');
            const typeInput = document.getElementById('habit-type');

            const newHabit = {
                id: Date.now().toString(),
                name: nameInput.value.trim(),
                type: typeInput.value,
                history: {}
            };

            habits.push(newHabit);
            saveData();
            renderHabits();
            nameInput.value = '';
        });

        // Save to LocalStorage
        function saveData() {
            localStorage.setItem('habitgrid_data', JSON.stringify(habits));
        }

        // Delete Habit Helper
        window.deleteHabit = function(id) {
            habits = habits.filter(h => h.id !== id);
            saveData();
            renderHabits();
        }

        // Toggle Single Day Checkbox
        window.toggleDay = function(habitId, dateStr) {
            const habit = habits.find(h => h.id === habitId);
            if (habit) {
                habit.history[dateStr] = !habit.history[dateStr];
                saveData();
                renderHabits();
            }
        }

        // Calculate Longest Active Streak
        function calculateStreak(history, type) {
            let currentStreak = 0;
            let maxStreak = 0;

            for (let d = 1; d <= daysInMonth; d++) {
                const dateStr = `${currentYear}-07-${String(d).padStart(2, '0')}`;
                const status = history[dateStr];
                
                // For 'want', true means success. For 'dont', true means bad habit performed (break streak).
                const isSuccess = type === 'want' ? !!status : (status === undefined ? true : !status);

                if (isSuccess) {
                    currentStreak++;
                    if (currentStreak > maxStreak) maxStreak = currentStreak;
                } else {
                    currentStreak = 0;
                }
            }
            return maxStreak;
        }

        // Main Render Loop
        function renderHabits() {
            habitsContainer.innerHTML = '';

            if (habits.length === 0) {
                habitsContainer.innerHTML = `
                    <div class="text-center py-12 text-gray-500 text-sm">
                        No habits tracked yet. Add your first habit above to get started!
                    </div>`;
                return;
            }

            habits.forEach(habit => {
                const history = habit.history || {};
                
                // Compute Stats
                let totalSuccesses = 0;
                for (let d = 1; d <= daysInMonth; d++) {
                    const dateStr = `${currentYear}-07-${String(d).padStart(2, '0')}`;
                    const status = history[dateStr];
                    if (habit.type === 'want' && !!status) totalSuccesses++;
                    if (habit.type === 'dont' && status === false) totalSuccesses++; // explicit avoid
                }
                
                const streak = calculateStreak(history, habit.type);

                // Build Grid Item Elements
                let gridHtml = '';
                for (let d = 1; d <= daysInMonth; d++) {
                    const dateStr = `${currentYear}-07-${String(d).padStart(2, '0')}`;
                    const isChecked = !!history[dateStr];
                    
                    let bgClass = 'bg-[#1e293b] hover:border-gray-500'; // Default empty square
                    
                    if (habit.type === 'want') {
                        if (isChecked) bgClass = 'bg-emerald-500 border-emerald-400 shadow-sm shadow-emerald-900/50';
                    } else {
                        // For bad habits: Red means you slipped up. Empty means clear streak.
                        if (isChecked) bgClass = 'bg-rose-500 border-rose-400 shadow-sm shadow-rose-900/50';
                    }

                    gridHtml += `
                        <button 
                            onclick="toggleDay('${habit.id}', '${dateStr}')" 
                            title="${dateStr}"
                            class="w-7 h-7 rounded border border-gray-800/40 cursor-pointer focus:outline-none transition-all flex items-center justify-center text-[10px] font-mono text-gray-400 ${bgClass}">
                            ${d}
                        </button>
                    `;
                }

                // Append Habit Visual Component Row
                const element = document.createElement('div');
                element.className = "bg-[#0f172a] border border-gray-800 rounded-xl p-4 shadow-md space-y-4";
                element.innerHTML = `
                    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-2 border-b border-gray-800 pb-3">
                        <div>
                            <div class="flex items-center gap-2">
                                <span class="text-sm">${habit.type === 'want' ? '🟢' : '🔴'}</span>
                                <h3 class="font-semibold text-base tracking-wide">${habit.name}</h3>
                            </div>
                            <p class="text-xs text-gray-400 mt-0.5">${habit.type === 'want' ? 'Goal: Build this habit' : 'Goal: Avoid this behavior'}</p>
                        </div>
                        <div class="flex items-center gap-4 text-xs font-mono bg-[#1e293b]/50 px-3 py-1.5 rounded-lg border border-gray-800 w-fit">
                            <div>Streak: <span class="text-cyan-400 font-bold">${streak}d</span></div>
                            <div class="text-gray-600">|</div>
                            <div>Score: <span class="text-emerald-400 font-bold">${totalSuccesses}</span></div>
                            <button onclick="deleteHabit('${habit.id}')" class="text-gray-500 hover:text-rose-400 transition-colors ml-2 cursor-pointer" title="Delete Habit">
                                🗑️
                            </button>
                        </div>
                    </div>
                    
                    <div>
                        <div class="text-xs text-gray-400 mb-2 font-medium tracking-wider uppercase">July Consistency Grid</div>
                        <div class="flex flex-wrap gap-1.5 max-w-full">
                            ${gridHtml}
                        </div>
                    </div>
                `;
                habitsContainer.appendChild(element);
            });
        }

        // Initialize Render
        renderHabits();
    </script>
</body>
</html>
